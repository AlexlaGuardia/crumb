<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0b0e14"/>
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="#1e2533" stroke-width="2"/>

  <text x="80" y="118" font-family="DejaVu Sans Mono, monospace" font-size="92" font-weight="bold" fill="#e6edf3" letter-spacing="-3">Crumb<tspan fill="#7ee787">.</tspan></text>
  <text x="86" y="172" font-family="DejaVu Sans Mono, monospace" font-size="32" fill="#8b96a8">trustless keys across issuers</text>

  <!-- verifier card -->
  <g transform="translate(80,238)">
    <rect x="0" y="0" width="470" height="300" rx="14" fill="#0e1320" stroke="#2c3a4f" stroke-width="2"/>
    <text x="24" y="46" font-family="DejaVu Sans Mono, monospace" font-size="24" fill="#9aa6bd">verifier trusts <tspan fill="#e6edf3">an issuer</tspan></text>
    <text x="24" y="80" font-family="DejaVu Sans Mono, monospace" font-size="20" fill="#566075">not a frozen key</text>

    <rect x="30" y="112" width="410" height="72" rx="10" fill="#0e1a12" stroke="#2c5a37" stroke-width="2"/>
    <text x="52" y="146" font-family="DejaVu Sans Mono, monospace" font-size="20" fill="#7ee787">token  kid: <tspan fill="#e6edf3">idp-a-rs256-2</tspan></text>
    <text x="52" y="172" font-family="DejaVu Sans Mono, monospace" font-size="17" fill="#8b96a8">looked up live, by kid</text>

    <text x="24" y="228" font-family="DejaVu Sans Mono, monospace" font-size="19" fill="#9aa6bd">rotated? unseen kid &#8594; refetch</text>
    <text x="24" y="260" font-family="DejaVu Sans Mono, monospace" font-size="19" fill="#7ee787">&#10003; still verifies, no redeploy</text>
  </g>

  <!-- fetch arrow to issuer endpoint -->
  <g transform="translate(590,300)">
    <text x="60" y="30" text-anchor="middle" font-family="DejaVu Sans Mono, monospace" font-size="18" fill="#56d4c4">GET /jwks</text>
    <line x1="0" y1="60" x2="120" y2="60" stroke="#56d4c4" stroke-width="3"/>
    <polygon points="120,60 106,53 106,67" fill="#56d4c4"/>
    <text x="60" y="96" text-anchor="middle" font-family="DejaVu Sans Mono, monospace" font-size="16" fill="#566075">over TLS</text>
  </g>

  <!-- issuer node -->
  <g transform="translate(760,300)">
    <rect x="0" y="-8" width="360" height="136" rx="12" fill="#0e1320" stroke="#2c3a4f" stroke-width="2"/>
    <text x="24" y="34" font-family="DejaVu Sans Mono, monospace" font-size="22" fill="#7ee787">the issuer</text>
    <text x="24" y="70" font-family="DejaVu Sans Mono, monospace" font-size="18" fill="#9aa6bd">/.well-known + /jwks</text>
    <text x="24" y="102" font-family="DejaVu Sans Mono, monospace" font-size="17" fill="#8b96a8">keys from here, never the log</text>
  </g>

  <text x="1120" y="600" text-anchor="end" font-family="DejaVu Sans Mono, monospace" font-size="24" fill="#56d4c4">crumb.alexlaguardia.dev</text>
</svg>
