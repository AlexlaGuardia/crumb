<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0b0e14"/>
  <rect x="1" y="1" width="1198" height="628" rx="0" fill="none" stroke="#1e2533" stroke-width="2"/>

  <!-- breadcrumb trail icon (the wordmark mark, scaled up) -->
  <g transform="translate(90,150)">
    <circle cx="0"   cy="0" r="9"  fill="#566075"/>
    <circle cx="34"  cy="0" r="12" fill="#737e95"/>
    <circle cx="74"  cy="0" r="15" fill="#9aa6bd"/>
    <circle cx="120" cy="0" r="21" fill="#7ee787"/>
  </g>

  <!-- wordmark -->
  <text x="86" y="300" font-family="DejaVu Sans Mono, monospace" font-size="120" font-weight="bold" fill="#e6edf3" letter-spacing="-3">Crumb<tspan fill="#7ee787">.</tspan></text>

  <!-- tagline -->
  <text x="90" y="380" font-family="DejaVu Sans Mono, monospace" font-size="42" fill="#e6edf3">The trail leads back to the human.</text>

  <!-- subline -->
  <text x="90" y="442" font-family="DejaVu Sans Mono, monospace" font-size="26" fill="#8b96a8">Tamper-evident, individual-human attribution for AI agent</text>
  <text x="90" y="478" font-family="DejaVu Sans Mono, monospace" font-size="26" fill="#8b96a8">tool calls. Across MCP and OpenAI function-calling.</text>

  <!-- VERIFIED chip -->
  <g transform="translate(90,520)">
    <rect x="0" y="0" width="270" height="48" rx="10" fill="#0e1a12" stroke="#2c5a37" stroke-width="2"/>
    <text x="20" y="32" font-family="DejaVu Sans Mono, monospace" font-size="24" font-weight="bold" fill="#7ee787">VERIFIED &#10003;</text>
    <text x="178" y="32" font-family="DejaVu Sans Mono, monospace" font-size="20" fill="#8b96a8">chain</text>
  </g>

  <!-- url, bottom right -->
  <text x="1110" y="582" text-anchor="end" font-family="DejaVu Sans Mono, monospace" font-size="26" fill="#56d4c4">crumb.alexlaguardia.dev</text>
</svg>
